# ==================== 云客 CRM 私有部署 Docker Compose ====================
# 使用方式：
#   1. 复制 .env.example 为 .env 并修改配置
#   2. docker-compose up -d
#   3. 浏览器访问 http://localhost
#
# 注意：首次启动需等待 MySQL 初始化完成（约 30 秒）

version: "3.8"

services:
  # ==================== CRM 前端 (Nginx) ====================
  crm-web:
    image: crm-web:1.8.0
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: crm-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      # 共享上传文件目录（与后端一致）
      - crm-uploads:/app/uploads:ro
    depends_on:
      crm-api:
        condition: service_healthy
    networks:
      - crm-network

  # ==================== CRM 后端 API ====================
  crm-api:
    image: crm-api:1.8.0
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: crm-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: /api/v1
      DEPLOY_MODE: private

      # 数据库连接（连接容器内 MySQL）
      DB_TYPE: mysql
      DB_HOST: crm-db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-crm}
      DB_USERNAME: ${DB_USERNAME:-crm}
      DB_PASSWORD: ${DB_PASSWORD:?请在 .env 文件中设置 DB_PASSWORD}
      DB_CHARSET: utf8mb4
      DB_TIMEZONE: "+08:00"

      # JWT（必须修改）
      JWT_SECRET: ${JWT_SECRET:?请在 .env 文件中设置 JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?请在 .env 文件中设置 JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      CORS_CREDENTIALS: "true"

      # 安全
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 3000
      HELMET_ENABLED: "true"
      COMPRESSION_ENABLED: "true"

      # 文件
      UPLOAD_MAX_SIZE: 10485760
      UPLOAD_PATH: /app/uploads
      STATIC_PATH: /app/dist

      # 日志
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE_PATH: /app/logs
    volumes:
      - crm-uploads:/app/uploads
      - crm-logs:/app/logs
    depends_on:
      crm-db:
        condition: service_healthy
    networks:
      - crm-network

  # ==================== MySQL 数据库 ====================
  crm-db:
    image: mysql:8.0
    container_name: crm-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请在 .env 文件中设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-crm}
      MYSQL_USER: ${DB_USERNAME:-crm}
      MYSQL_PASSWORD: ${DB_PASSWORD:?请在 .env 文件中设置 DB_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=500
      - --innodb-buffer-pool-size=256M
    volumes:
      - crm-db-data:/var/lib/mysql
      # 首次启动自动导入 schema
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      # 仅开发/调试时暴露，生产环境建议注释掉
      - "${DB_EXTERNAL_PORT:-127.0.0.1:3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - crm-network

# ==================== 持久化数据卷 ====================
volumes:
  crm-db-data:
    driver: local
  crm-uploads:
    driver: local
  crm-logs:
    driver: local

# ==================== 内部网络 ====================
networks:
  crm-network:
    driver: bridge
