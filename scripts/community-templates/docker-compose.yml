# 云客 CRM 社区版 - Docker Compose 一键部署
# 使用方法：
#   1. cp .env.example .env && 编辑 .env 文件
#   2. docker-compose up -d
#   3. 访问 http://localhost:5173

version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: yunke-crm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-yunke123456}
      MYSQL_DATABASE: ${DB_DATABASE:-yunke_crm}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yunke-crm-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-yunke_crm}
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-yunke123456}
      - JWT_SECRET=${JWT_SECRET:-yunke-community-jwt-secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - PORT=3000
      - DEPLOY_MODE=private
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/uploads

  # 前端（生产模式使用 Nginx）
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: yunke-crm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${VITE_PORT:-5173}:80"

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
