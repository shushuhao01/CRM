# 后端自动测试 — 每次 push 自动跑 Jest
name: Backend Tests

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm install
        working-directory: backend
      - run: npm test -- --no-coverage --forceExit
        working-directory: backend
