# ============================================
# 云客CRM 四域名 Nginx 配置（yunkes.com）
# yunkes.com          → 官网
# crm.yunkes.com      → CRM系统
# admin.yunkes.com    → 管理后台
# api.yunkes.com      → API接口
# ============================================

# 上游服务器配置
upstream backend_api {
    server 127.0.0.1:3000;  # Node.js 后端服务
    keepalive 64;
}

# ============================================
# 1. 官网 - yunkes.com
# ============================================
server {
    listen 80;
    server_name yunkes.com www.yunkes.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yunkes.com www.yunkes.com;

    # SSL证书配置
    ssl_certificate /www/server/panel/vhost/cert/yunkes.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/yunkes.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # 官网静态文件目录
    root /www/wwwroot/yunkes.com/website/dist;
    index index.html;

    # 官网前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API代理到后端（公开接口 - 注册、套餐查询、支付等）
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    access_log /www/wwwlogs/yunkes.com.log;
    error_log /www/wwwlogs/yunkes.com.error.log;
}

# ============================================
# 2. CRM系统 - crm.yunkes.com
# ============================================
server {
    listen 80;
    server_name crm.yunkes.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name crm.yunkes.com;

    ssl_certificate /www/server/panel/vhost/cert/yunkes.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/yunkes.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # CRM主应用静态文件
    root /www/wwwroot/yunkes.com/dist;
    index index.html;

    # 微信域名验证文件
    location = /MP_verify_xgWF1yuaQJX06PVT.txt {
        root /www/wwwroot/yunkes.com;
    }

    # CRM前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket连接
    location /ws {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API代理
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 50m;
    }

    # 上传文件访问
    location /uploads/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 上传文件大小限制
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    access_log /www/wwwlogs/crm.yunkes.com.log;
    error_log /www/wwwlogs/crm.yunkes.com.error.log;
}

# ============================================
# 3. 管理后台 - admin.yunkes.com
# ============================================
server {
    listen 80;
    server_name admin.yunkes.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.yunkes.com;

    ssl_certificate /www/server/panel/vhost/cert/yunkes.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/yunkes.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # 管理后台静态文件目录
    root /www/wwwroot/yunkes.com/admin/dist;
    index index.html;

    # 管理后台前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 管理后台API代理
    location /api/v1/admin/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 通用API代理（用于公共接口如配置获取等）
    location /api/v1/public/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    access_log /www/wwwlogs/admin.yunkes.com.log;
    error_log /www/wwwlogs/admin.yunkes.com.error.log;
}

# ============================================
# 4. API服务 - api.yunkes.com
# ============================================
server {
    listen 80;
    server_name api.yunkes.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yunkes.com;

    ssl_certificate /www/server/panel/vhost/cert/yunkes.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/yunkes.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # 所有请求转发到后端
    location / {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    access_log /www/wwwlogs/api.yunkes.com.log;
    error_log /www/wwwlogs/api.yunkes.com.error.log;
}

